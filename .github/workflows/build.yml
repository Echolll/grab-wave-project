name: Build & Release GrabWave

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  #  WINDOWS → GrabWave.exe
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp PyQt6 imageio-ffmpeg browser-cookie3 pyinstaller
        shell: pwsh

      - name: Download Deno
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip" -OutFile deno.zip
          Expand-Archive deno.zip -DestinationPath .
          Remove-Item deno.zip

      - name: Build
        shell: pwsh
        run: pyinstaller build/GrabWave.spec --distpath dist --workpath build\_work

      - uses: actions/upload-artifact@v4
        with:
          name: GrabWave-Windows
          path: dist/GrabWave.exe

  # ─────────────────────────────────────────────
  #  macOS → Intel + Apple Silicon
  # ─────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest = ARM64 (Apple Silicon). Используем его для обеих сборок,
          # т.к. Python 3.11 там universal2, и PyInstaller может кросс-компилировать под Intel.
          - runner: macos-latest
            suffix: mac-intel
            arch: x86_64
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-apple-darwin.zip
          - runner: macos-latest
            suffix: mac-arm64
            arch: arm64
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp PyQt6 imageio-ffmpeg pyinstaller browser-cookie3

      - name: Download Deno
        run: |
          curl -fsSL "${{ matrix.deno_url }}" -o deno.zip
          unzip deno.zip && rm deno.zip && chmod +x deno

      - name: Build
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: pyinstaller build/GrabWave.spec --distpath dist --workpath build/_work

      - name: Rename
        run: mv dist/GrabWave dist/GrabWave-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: GrabWave-${{ matrix.suffix }}
          path: dist/GrabWave-${{ matrix.suffix }}

  # ─────────────────────────────────────────────
  #  LINUX — матрица дистрибутивов
  # ─────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:

          # Ubuntu/Debian/Mint (glibc 2.35+)
          - runner: ubuntu-22.04
            container: ''
            suffix: linux-ubuntu
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip

          # Manylinux x86_64 (glibc 2.28+)
          - runner: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            suffix: linux-manylinux
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip

          # Fedora (glibc 2.38+)
          - runner: ubuntu-22.04
            container: fedora:39
            suffix: linux-fedora
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip

          # Manylinux ARM64 (glibc 2.28+)
          - runner: ubuntu-22.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            suffix: linux-arm64
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-aarch64-unknown-linux-gnu.zip

    steps:
      - uses: actions/checkout@v4

      # Ubuntu — apt
      - name: Deps (apt)
        if: matrix.container == ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 unzip curl

      # Manylinux (x86_64 & aarch64) — yum
      - name: Deps (yum)
        if: contains(matrix.container, 'manylinux')
        run: |
          yum install -y mesa-libGL dbus-libs unzip

      # Fedora — dnf
      - name: Deps (dnf)
        if: matrix.container == 'fedora:39'
        run: |
          dnf install -y python3 python3-pip binutils mesa-libGL dbus-libs \
            libxkbcommon-x11 xcb-util-cursor xcb-util-wm xcb-util-image \
            xcb-util-keysyms xcb-util-renderutil unzip curl

      - name: Setup Python (native)
        if: matrix.container == ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Установка зависимостей через Native Python
      - name: Install Python deps (native)
        if: matrix.container == '' || matrix.container == 'fedora:39'
        run: python3 -m pip install yt-dlp PyQt6 imageio-ffmpeg pyinstaller browser-cookie3

      # Установка зависимостей через Manylinux Python 3.11 (включая обновление pip!)
      - name: Install Python deps (Manylinux)
        if: contains(matrix.container, 'manylinux')
        run: |
          /opt/python/cp311-cp311/bin/python -m pip install --upgrade pip
          /opt/python/cp311-cp311/bin/python -m pip install yt-dlp PyQt6 imageio-ffmpeg pyinstaller browser-cookie3

      - name: Download Deno
        run: |
          curl -fsSL "${{ matrix.deno_url }}" -o deno.zip
          unzip deno.zip && rm deno.zip && chmod +x deno

      # Сборка через Native Python
      - name: Build (native)
        if: matrix.container == '' || matrix.container == 'fedora:39'
        run: python3 -m PyInstaller build/GrabWave.spec --distpath dist --workpath build/_work

      # Сборка через Manylinux Python 3.11
      - name: Build (Manylinux)
        if: contains(matrix.container, 'manylinux')
        run: /opt/python/cp311-cp311/bin/python -m PyInstaller build/GrabWave.spec --distpath dist --workpath build/_work

      - name: Rename
        run: mv dist/GrabWave dist/GrabWave-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: GrabWave-${{ matrix.suffix }}
          path: dist/GrabWave-${{ matrix.suffix }}

  # ─────────────────────────────────────────────
  #  RELEASE
  # ─────────────────────────────────────────────
  release:
    name: 🚀 Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: "GrabWave ${{ github.ref_name }}"
          body: |
            ## 🌊 GrabWave ${{ github.ref_name }}

            ### 🪟 Windows
            | Файл | Описание |
            |------|----------|
            | `GrabWave.exe` | Windows 10/11 (64-bit) |

            ### 🍎 macOS
            | Файл | Описание |
            |------|----------|
            | `GrabWave-mac-arm64` | Apple Silicon (M1/M2/M3/M4) |
            | `GrabWave-mac-intel` | Intel Mac |

            ### 🐧 Linux
            | Файл | Дистрибутивы |
            |------|--------------|
            | `GrabWave-linux-ubuntu` | Ubuntu 22.04+, Debian 12+, Mint |
            | `GrabWave-linux-manylinux` | CentOS 8+, RHEL 8+, Fedora 28+, Amazon Linux 2023 |
            | `GrabWave-linux-fedora` | Fedora 39+ |
            | `GrabWave-linux-arm64` | Raspberry Pi 4/5, ARM64 серверы |

            ### Запуск на Linux/macOS
            ```bash
            chmod +x GrabWave-*
            ./GrabWave-linux-ubuntu
            ```
          files: |
            artifacts/GrabWave-Windows/GrabWave.exe
            artifacts/GrabWave-mac-intel/GrabWave-mac-intel
            artifacts/GrabWave-mac-arm64/GrabWave-mac-arm64
            artifacts/GrabWave-linux-ubuntu/GrabWave-linux-ubuntu
            artifacts/GrabWave-linux-manylinux/GrabWave-linux-manylinux
            artifacts/GrabWave-linux-fedora/GrabWave-linux-fedora
            artifacts/GrabWave-linux-arm64/GrabWave-linux-arm64
          draft: false
          prerelease: false
