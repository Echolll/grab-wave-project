name: Build & Release GrabWave

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  #  WINDOWS → GrabWave.exe
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp PyQt6 imageio-ffmpeg browser-cookie3 pyinstaller
        shell: pwsh

      - name: Download Deno
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip" -OutFile deno.zip
          Expand-Archive deno.zip -DestinationPath .
          Remove-Item deno.zip

      - name: Build
        shell: pwsh
        run: pyinstaller build/GrabWave.spec --distpath dist --workpath build\_work

      - uses: actions/upload-artifact@v4
        with:
          name: GrabWave-Windows
          path: dist/GrabWave.exe

  # ─────────────────────────────────────────────
  #  macOS → Apple Silicon (только)
  # ─────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            suffix: mac-arm64
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yt-dlp PyQt6 imageio-ffmpeg pyinstaller browser-cookie3

      - name: Download Deno
        run: |
          curl -fsSL "${{ matrix.deno_url }}" -o deno.zip
          unzip deno.zip && rm deno.zip && chmod +x deno

      - name: Build
        run: pyinstaller build/GrabWave.spec --distpath dist --workpath build/_work

      - name: Rename
        run: mv dist/GrabWave dist/GrabWave-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: GrabWave-${{ matrix.suffix }}
          path: dist/GrabWave-${{ matrix.suffix }}

  # ─────────────────────────────────────────────
  #  LINUX — матрица дистрибутивов
  # ─────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu
          - runner: ubuntu-22.04
            container: ''
            suffix: linux-ubuntu
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip

          # Debian 12
          - runner: ubuntu-22.04
            container: debian:12
            suffix: linux-debian
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip

          # Fedora 39
          - runner: ubuntu-22.04
            container: fedora:39
            suffix: linux-fedora
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip

          # Arch Linux
          - runner: ubuntu-22.04
            container: archlinux:latest
            suffix: linux-arch
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip

    steps:
      - uses: actions/checkout@v4

      # Ubuntu
      - name: Deps (Ubuntu)
        if: matrix.container == ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 unzip curl

      # Debian
      - name: Deps (Debian)
        if: matrix.container == 'debian:12'
        run: |
          apt-get update -qq
          apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 unzip curl python3 python3-pip python3-venv

      # Fedora
      - name: Deps (Fedora)
        if: matrix.container == 'fedora:39'
        run: |
          dnf install -y python3 python3-pip binutils mesa-libGL dbus-libs \
            libxkbcommon-x11 xcb-util-cursor xcb-util-wm xcb-util-image \
            xcb-util-keysyms xcb-util-renderutil unzip curl

      # Arch Linux
      - name: Deps (Arch)
        if: matrix.container == 'archlinux:latest'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pip base-devel mesa dbus libxkbcommon \
            xcb-util-cursor xcb-util-wm xcb-util-image xcb-util-keysyms xcb-util-renderutil unzip curl

      # Setup Python (Ubuntu only)
      - name: Setup Python (Ubuntu)
        if: matrix.container == ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install Dependencies (with venv for containers to avoid externally-managed-environment errors)
      - name: Install Python deps
        run: |
          if [ "${{ matrix.container }}" != "" ]; then
            python3 -m venv venv
            source venv/bin/activate
          fi
          python3 -m pip install yt-dlp PyQt6 imageio-ffmpeg pyinstaller browser-cookie3

      - name: Download Deno
        run: |
          curl -fsSL "${{ matrix.deno_url }}" -o deno.zip
          unzip deno.zip && rm deno.zip && chmod +x deno

      - name: Build
        run: |
          if [ "${{ matrix.container }}" != "" ]; then
            source venv/bin/activate
          fi
          python3 -m PyInstaller build/GrabWave.spec --distpath dist --workpath build/_work

      - name: Rename
        run: mv dist/GrabWave dist/GrabWave-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: GrabWave-${{ matrix.suffix }}
          path: dist/GrabWave-${{ matrix.suffix }}

  # ─────────────────────────────────────────────
  #  RELEASE
  # ─────────────────────────────────────────────
  release:
    name: 🚀 Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: "GrabWave ${{ github.ref_name }}"
          body: |
            ## 🌊 GrabWave ${{ github.ref_name }}

            ### 🪟 Windows
            | Файл | Описание |
            |------|----------|
            | `GrabWave.exe` | Windows 10/11 (64-bit) |

            ### 🍎 macOS
            | Файл | Описание |
            |------|----------|
            | `GrabWave-mac-arm64` | Apple Silicon (M1/M2/M3/M4) |
            | `GrabWave-mac-intel` | Intel Mac |

            ### 🐧 Linux
            | Файл | Дистрибутивы |
            |------|--------------|
            | `GrabWave-linux-ubuntu` | Ubuntu 22.04+, Debian 12+, Mint |
            | `GrabWave-linux-manylinux` | CentOS 8+, RHEL 8+, Fedora 28+, Amazon Linux 2023 |
            | `GrabWave-linux-fedora` | Fedora 39+ |
            | `GrabWave-linux-arm64` | Raspberry Pi 4/5, ARM64 серверы |

            ### Запуск на Linux/macOS
            ```bash
            chmod +x GrabWave-*
            ./GrabWave-linux-ubuntu
            ```
          files: |
            artifacts/GrabWave-Windows/GrabWave.exe
            artifacts/GrabWave-mac-intel/GrabWave-mac-intel
            artifacts/GrabWave-mac-arm64/GrabWave-mac-arm64
            artifacts/GrabWave-linux-ubuntu/GrabWave-linux-ubuntu
            artifacts/GrabWave-linux-manylinux/GrabWave-linux-manylinux
            artifacts/GrabWave-linux-fedora/GrabWave-linux-fedora
            artifacts/GrabWave-linux-arm64/GrabWave-linux-arm64
          draft: false
          prerelease: false
